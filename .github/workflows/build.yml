name: MSBuild

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

env:
  SOLUTION_FILE_PATH: CP_Main_10.sln

# build-tag-number / GitHub Release 需要写 ref 与 release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate build number
        id: buildnumber
        uses: onyxmueller/build-tag-number@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set the value
        run: |
          echo "VERSION_FILENAME=3_25_${env:BUILD_NUMBER}_0" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "VERSION_DOT_FILENAME=3.25.${env:BUILD_NUMBER}.0" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        working-directory: ${{ env.GITHUB_WORKSPACE }}
        run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

      - name: Build
        run: msbuild CP_Main_10.sln /p:Configuration=Release /p:Platform=x64

      - name: Set Versions
        run: |
          DittoSetup\rcedit-x64 Release64\Ditto.exe --set-file-version ${{ env.VERSION_DOT_FILENAME }} --set-product-version ${{ env.VERSION_DOT_FILENAME }}

      - name: Prepare runtime files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Release64\Language | Out-Null
          New-Item -ItemType Directory -Force -Path Release64\Themes | Out-Null
          New-Item -ItemType Directory -Force -Path Release64\Addins | Out-Null
          Copy-Item -Force Debug\Language\* Release64\Language\
          if (Test-Path Debug\Themes) { Copy-Item -Force Debug\Themes\* Release64\Themes\ }

      - name: Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: DittoSetup\DittoSetup_10.iss

      - name: Build Portable
        run: |
          DittoSetup\BuildPortableZIP.bat "DittoPortable_${{ env.VERSION_FILENAME }}" bit64

      - name: Zip Debug Files
        continue-on-error: true
        run: |
          7z a DittoSetup\output\DittoDebug_${{ env.VERSION_FILENAME }}.7z *.pdb -r
          7z a DittoSetup\output\DittoDebug_${{ env.VERSION_FILENAME }}.7z *.map -r

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ditto-x64-${{ env.VERSION_FILENAME }}
          retention-days: 14
          path: |
            Release64\Ditto.exe
            Release64\ICU_Loader.dll
            Release64\Addins\DittoUtil.dll
            Release64\Language\
            Release64\Themes\
            DittoSetup\output\DittoSetup_${{ env.VERSION_FILENAME }}.exe
            DittoSetup\output\DittoPortable_${{ env.VERSION_FILENAME }}.zip
            DittoSetup\output\DittoDebug_${{ env.VERSION_FILENAME }}.7z

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_FILENAME }}
          name: Ditto ${{ env.VERSION_DOT_FILENAME }}
          generate_release_notes: true
          files: |
            DittoSetup/output/DittoSetup_${{ env.VERSION_FILENAME }}.exe
            DittoSetup/output/DittoPortable_${{ env.VERSION_FILENAME }}.zip
            DittoSetup/output/DittoDebug_${{ env.VERSION_FILENAME }}.7z
